<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <!-- Client box -->
  <rect x="60" y="5" width="100" height="36" rx="8" fill="#d4e6f1" stroke="#2E86C1" stroke-width="1.5"/>
  <text x="110" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E86C1">Client</text>

  <!-- Server box -->
  <rect x="440" y="5" width="100" height="36" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="490" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#27ae60">Server</text>

  <!-- Client lifeline -->
  <line x1="110" y1="41" x2="110" y2="175" stroke="#2E86C1" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Server lifeline -->
  <line x1="490" y1="41" x2="490" y2="175" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Arrow 1: SYN -->
  <line x1="110" y1="68" x2="480" y2="68" stroke="#e67e22" stroke-width="2"/>
  <polygon points="480,63 490,68 480,73" fill="#e67e22"/>
  <text x="300" y="62" text-anchor="middle" font-size="12" font-weight="600" fill="#e67e22" font-family="'Monaco','Menlo',monospace">SYN</text>
  <text x="300" y="82" text-anchor="middle" font-size="10" fill="#7f8c8d">(I want to connect)</text>

  <!-- Arrow 2: SYN-ACK -->
  <line x1="490" y1="110" x2="120" y2="110" stroke="#e67e22" stroke-width="2"/>
  <polygon points="120,105 110,110 120,115" fill="#e67e22"/>
  <text x="300" y="104" text-anchor="middle" font-size="12" font-weight="600" fill="#e67e22" font-family="'Monaco','Menlo',monospace">SYN-ACK</text>
  <text x="300" y="124" text-anchor="middle" font-size="10" fill="#7f8c8d">(OK, I'm ready too)</text>

  <!-- Arrow 3: ACK -->
  <line x1="110" y1="152" x2="480" y2="152" stroke="#e67e22" stroke-width="2"/>
  <polygon points="480,147 490,152 480,157" fill="#e67e22"/>
  <text x="300" y="146" text-anchor="middle" font-size="12" font-weight="600" fill="#e67e22" font-family="'Monaco','Menlo',monospace">ACK</text>
  <text x="300" y="166" text-anchor="middle" font-size="10" fill="#7f8c8d">(Great, let's talk)</text>

  <!-- Established label -->
  <line x1="60" y1="190" x2="540" y2="190" stroke="#2c3e50" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="300" y="210" text-anchor="middle" font-size="12" font-weight="600" fill="#2c3e50">Connection established — HTTP request/response can flow</text>
</svg>